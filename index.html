<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Lavina House — Restaurants">
    <meta property="og:description" content="Discover our restaurants and explore their menus">
    <meta property="og:image" content="logo.jpeg">
    <meta property="og:url" content="https://lavina-house.vercel.app">
    <title>Lavina House — Restaurants</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent-gold: #C9A366;
            --text: #e0e0e0;
            --text-muted: #999;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Language toggle */
        .lang-bar {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 100;
            display: flex;
            gap: 6px;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--accent-gold);
            color: #1a1a1a;
        }
        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 20px 20px;
        }
        .brand-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-gold);
            margin-bottom: 16px;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            font-weight: 700;
        }
        .brand-tagline {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 6px;
        }
        .ornament {
            width: 60px;
            height: 2px;
            background: var(--accent-gold);
            margin: 16px auto;
            opacity: 0.5;
        }
        /* Restaurant grid */
        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px 24px 60px;
            max-width: 900px;
            width: 100%;
        }
        .restaurant-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            border: 1px solid #2a2a2a;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .restaurant-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(201, 163, 102, 0.15);
            border-color: var(--accent-gold);
        }
        .card-img-wrap {
            width: 100%;
            height: 180px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-img-placeholder {
            font-size: 3rem;
            opacity: 0.3;
        }
        .card-body {
            padding: 16px;
        }
        .card-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .card-address {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.4;
        }
        .card-arrow {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-gold);
        }
        /* Loading & error */
        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(201,163,102,0.2);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        /* RTL/LTR */
        [dir="ltr"] .lang-bar { right: auto; left: 16px; }
        [lang="en"] .ar-text { display: none !important; }
        [lang="ar"] .en-text { display: none !important; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn active" onclick="setLang('ar')">AR</button>
    </div>

    <div class="hero">
        <img src="logo.jpeg" alt="Lavina House" class="brand-logo">
        <h1 class="brand-name">Lavina House</h1>
        <p class="brand-tagline ar-text">اختر المطعم لتصفح القائمة</p>
        <p class="brand-tagline en-text">Select a restaurant to browse its menu</p>
        <div class="ornament"></div>
    </div>

    <div class="restaurant-grid" id="restaurantGrid">
        <div class="loading-spinner">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('restaurantGrid');
        let currentLang = localStorage.getItem('lavina_language') || 'ar';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lavina_language', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
            });
        }

        async function loadRestaurants() {
            try {
                const resp = await fetch('/api/index.php?endpoint=restaurants');
                if (!resp.ok) throw new Error('Failed to load');
                const data = await resp.json();
                const restaurants = data.restaurants || [];

                if (restaurants.length === 0) {
                    grid.innerHTML = `<div class="empty-state">
                        <p class="ar-text">لا توجد مطاعم متاحة حالياً</p>
                        <p class="en-text">No restaurants available at the moment</p>
                    </div>`;
                    return;
                }

                grid.innerHTML = restaurants.map(r => `
                    <a href="/menu?slug=${r.slug}" class="restaurant-card">
                        <div class="card-img-wrap">
                            ${r.logo
                                ? `<img src="${r.logo}" alt="${r.name_en}" class="card-img">`
                                : `<span class="card-img-placeholder">🍽</span>`}
                        </div>
                        <div class="card-body">
                            <div class="card-name">
                                <span class="ar-text">${r.name_ar}</span>
                                <span class="en-text">${r.name_en}</span>
                            </div>
                            ${r.address_ar ? `<div class="card-address ar-text">${r.address_ar}</div>` : ''}
                            ${r.address_en ? `<div class="card-address en-text">${r.address_en}</div>` : ''}
                            <div class="card-arrow">
                                <span class="ar-text">تصفح القائمة ←</span>
                                <span class="en-text">Browse Menu →</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div class="empty-state">
                    <p class="ar-text">تعذر تحميل المطاعم. يرجى المحاولة مرة أخرى.</p>
                    <p class="en-text">Could not load restaurants. Please try again.</p>
                </div>`;
            }
        }

        // Init
        setLang(currentLang);
        loadRestaurants();
    </script>
</body>
</html>
